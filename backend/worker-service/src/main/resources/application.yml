spring:
  application:
    name: worker-service
  main:
    web-application-type: none

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/livecode}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  queue:
    name: execution_queue
  worker:
    max-retries: ${WORKER_MAX_RETRIES:3}
  executor:
    timeout-seconds: ${WORKER_TIMEOUT_SECONDS:10}
    memory-limit: ${WORKER_MEMORY_LIMIT:256m}
    workspace-base: ${WORKER_WORKSPACE_BASE:/tmp/live-code}
