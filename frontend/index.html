<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edtronaut AI - Live Code Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Ace Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <h1>Edtronaut AI</h1>
            </div>
            <div class="header-actions">
                <div class="status-badge" id="save-status">Ready</div>
                <div class="session-info" id="session-display">Session: None</div>
            </div>
        </header>

        <main>
            <div class="sidebar">
                <div class="sidebar-section">
                    <h3>Language</h3>
                    <select id="language-select">
                        <option value="python">Python</option>
                        <option value="nodejs">Node.js</option>
                        <option value="java">Java</option>
                    </select>
                </div>
                <div class="sidebar-section">
                    <button id="run-btn" class="primary-btn">
                        <span class="btn-icon">▶</span> Run Code
                    </button>
                    <button id="new-session-btn" class="secondary-btn">New Session</button>
                </div>
                <div class="sidebar-info">
                    <p>Standard input is not supported. Java class must be named <code>Main</code>.</p>
                </div>
            </div>

            <div class="editor-section">
                <div class="editor-header">
                    <div class="file-name" id="file-name-display">main.py</div>
                </div>
                <div id="editor-container"></div>
            </div>

            <div class="output-section">
                <div class="output-header">
                    <h3>Output</h3>
                    <div id="execution-status-badge" class="badge">Idle</div>
                </div>
                <div class="console" id="console-output">
                    <div class="console-placeholder">Execution results will appear here...</div>
                </div>
                <div class="output-footer" id="output-footer">
                    <span id="execution-time"></span>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
